<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Request 🌸</title>
    <!-- Beautiful Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transition: all 0.4s ease;
        }

        .hidden {
            display: none !important;
        }

        h2 {
            color: #d81b60;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        /* Buttons Styling */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #yesBtn, .next-btn, .time-btn, .food-btn {
            background-color: #ec407a;
            color: white;
        }

        #yesBtn:hover, .next-btn:hover {
            background-color: #d81b60;
            transform: scale(1.05);
        }

        #noBtn {
            background-color: #f5f5f5;
            color: #616161;
            transition: all 0.1s ease;
        }

        /* Screen 2 & 3 custom layouts */
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #f8bbd0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            color: #495057;
            margin-bottom: 20px;
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .time-btn, .food-btn {
            background-color: #f8bbd0;
            color: #d81b60;
            border-radius: 15px;
            padding: 12px;
            font-size: 0.95rem;
        }

        .time-btn.selected, .food-btn.selected {
            background-color: #d81b60;
            color: white;
            transform: scale(1.02);
        }

        .next-btn {
            width: 100%;
            margin-top: 10px;
        }

        /* Final Screen Details styling */
        .summary-box {
            background-color: #fff0f5;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .summary-item {
            font-size: 1.05rem;
            color: #4f4f4f;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-note {
            font-size: 0.75rem;
            color: #b0bec5;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <!-- Screen 1: The Proposal -->
    <div id="screen1" class="card">
        <h2>🌸 Will you go on a date with me? 🌸</h2>
        <div class="btn-group">
            <button id="yesBtn" onclick="nextScreen(2)">YES ❤️</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">NO 😢</button>
        </div>
    </div>

    <!-- Screen 2: Date & Time Picker -->
    <div id="screen2" class="card hidden">
        <h2>So... when are you free? 🐾</h2>
        <input type="date" id="datePicker">
        
        <div class="grid-options">
            <button class="time-btn" onclick="selectTime(this, '12:00 PM')">12:00 PM</button>
            <button class="time-btn" onclick="selectTime(this, '4:00 PM')">4:00 PM</button>
            <button class="time-btn" onclick="selectTime(this, '6:30 PM')">6:30 PM</button>
            <button class="time-btn" onclick="selectTime(this, '8:00 PM')">8:00 PM</button>
        </div>
        
        <button onclick="checkScreen2()" class="next-btn">Set the date 💕</button>
    </div>

    <!-- Screen 3: Food Options -->
    <div id="screen3" class="card hidden">
        <h2>What are we feeling? 🍕✨</h2>
        <div class="grid-options">
            <button class="food-btn" onclick="selectFood(this, 'Pizza')">🍕 Pizza</button>
            <button class="food-btn" onclick="selectFood(this, 'Sushi')">🍣 Sushi</button>
            <button class="food-btn" onclick="selectFood(this, 'Burgers')">🍔 Burgers</button>
            <button class="food-btn" onclick="selectFood(this, 'Pasta')">🍝 Pasta</button>
            <button class="food-btn" onclick="selectFood(this, 'Tacos')">🌮 Tacos</button>
            <button class="food-btn" onclick="selectFood(this, 'Ramen')">🍜 Ramen</button>
        </div>
        <button onclick="checkScreen3()" class="next-btn">Next 💕</button>
    </div>

    <!-- Screen 4: Summary & Celebration -->
    <div id="screen4" class="card hidden">
        <h2>YAY!! 💖</h2>
        <div class="summary-box">
            <div class="summary-item" id="sumDate">📅 </div>
            <div class="summary-item" id="sumTime">⏰ </div>
            <div class="summary-item" id="sumFood">🍽️ </div>
        </div>
        <h2>I can't wait to see you! ✨</h2>
        <p class="footer-note">(normal guys send texts, I made a website. I'm not like other guys xx)</p>
    </div>

    <script>
        let data = {
            date: "",
            time: "",
            food: ""
        };

        function nextScreen(num) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(`screen${num}`).classList.remove('hidden');
        }

        // Screen 2 Logic
        function selectTime(element, timeVal) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
            data.time = timeVal;
        }

        function checkScreen2() {
            data.date = document.getElementById('datePicker').value;
            if(!data.date || !data.time) {
                alert("Please select both Date and Time! 🥰");
                return;
            }
            nextScreen(3);
        }

        // Screen 3 Logic
        function selectFood(element, foodVal) {
            document.querySelectorAll('.food-btn').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
            data.food = foodVal;
        }

        function checkScreen3() {
            if(!data.food) {
                alert("Pick a food option please! 🍕");
                return;
            }
            
            // Format dynamic date display
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            const formattedDate = new Date(data.date).toLocaleDateString('en-US', options);

            // Populate Final Screen
            document.getElementById('sumDate').innerText = `📅 ${formattedDate}`;
            document.getElementById('sumTime').innerText = `⏰ ${data.time}`;
            document.getElementById('sumFood').innerText = `🍽️ ${data.food}`;
            
            nextScreen(4);
        }

        // The "Runaway" No Button Logic 
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            // Randomly position within screen bounds minus button width/height
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }
    </script>
</body>
</html>
